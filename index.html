<div class="hdr"><h1 onclick="if(mode==='detail'){mode='list';sel=null;renderNav();renderList()}" style="cursor:pointer">⚾ MLB Edge</h1><button class="ref" onclick="refresh()">↻ Refresh</button></div>

<script>
const BASE = 'https://statsapi.mlb.com';
let date = new Date().toISOString().slice(0,10);
let games = [];
let sel = null;
let mode = 'list';
let savant = {};
let savantPit = {}; // pitcher player_id -> {xfip, xera, pitch_pct_ff, pitch_pct_sl, pitch_pct_cu, pitch_pct_ch, ...}
let kalshi = {}; // gamePk -> {ml_away, ml_home, spread, ou, markets:[]}
let picks = JSON.parse(localStorage.getItem('mlb_picks') || '{}'); // gamePk -> {type, side, price, label, date}
let edgeCache = {}; // gamePk -> { awScore, hmScore, awAbbr, hmAbbr, verdict }

function savePicks() { localStorage.setItem('mlb_picks', JSON.stringify(picks)); }

function getPicksForDate(d) {
  return Object.entries(picks).filter(([k, p]) => p.date === d);
}

// Park factors (runs, 1.00 = neutral, >1.00 = hitter friendly)
const PARK = {
  'COL':1.30,'BOS':1.10,'CIN':1.08,'TEX':1.06,'CHC':1.05,'PHI':1.04,'NYY':1.04,
  'BAL':1.03,'MIL':1.02,'ATL':1.02,'MIN':1.01,'AZ':1.01,'HOU':1.00,'CLE':1.00,
  'PIT':0.99,'DET':0.99,'WSH':0.98,'STL':0.98,'LAA':0.98,'TOR':0.97,'KC':0.97,
  'SD':0.96,'CWS':0.96,'TB':0.95,'NYM':0.95,'SF':0.94,'MIA':0.93,'ATH':0.93,
  'LAD':0.97,'SEA':0.92
};
function addPick(gamePk, type, side, price, label) {
  let key = gamePk + '_' + type;
  if (picks[key] && picks[key].side === side) { delete picks[key]; } // toggle off
  else { picks[key] = { type, side, price, label, ts: Date.now() }; }
  savePicks();
}

// --- Odds API (The Odds API) ---
const ODDS_KEY = '2148af5f5b68ca273f1e2b859c9b7b3d';
async function loadOdds() {
  try {
    let r = await fetch('https://api.the-odds-api.com/v4/sports/baseball_mlb/odds?regions=us&markets=h2h,spreads,totals&oddsFormat=american&apiKey=' + ODDS_KEY);
    if (!r.ok) { console.warn('Odds API error:', r.status); return; }
    let data = await r.json();
    // Match odds to our games
    let teamAbbr = {
      'New York Yankees':'NYY','New York Mets':'NYM','Los Angeles Dodgers':'LAD',
      'San Diego Padres':'SD','Los Angeles Angels':'LAA','Houston Astros':'HOU',
      'Texas Rangers':'TEX','Seattle Mariners':'SEA','Oakland Athletics':'ATH','Athletics':'ATH',
      'Boston Red Sox':'BOS','Tampa Bay Rays':'TB','Toronto Blue Jays':'TOR',
      'Baltimore Orioles':'BAL','Minnesota Twins':'MIN','Cleveland Guardians':'CLE',
      'Detroit Tigers':'DET','Chicago White Sox':'CWS','Kansas City Royals':'KC',
      'Atlanta Braves':'ATL','Philadelphia Phillies':'PHI','Washington Nationals':'WSH',
      'Miami Marlins':'MIA','Chicago Cubs':'CHC','Cincinnati Reds':'CIN',
      'Milwaukee Brewers':'MIL','Pittsburgh Pirates':'PIT','St. Louis Cardinals':'STL',
      'San Francisco Giants':'SF','Arizona Diamondbacks':'AZ','Colorado Rockies':'COL'
    };
    data.forEach(ev => {
      let awAbbr = teamAbbr[ev.away_team] || null;
      let hmAbbr = teamAbbr[ev.home_team] || null;
      if (!awAbbr || !hmAbbr) return;
      let matched = games.find(g => g.teams.away.team.abbreviation === awAbbr && g.teams.home.team.abbreviation === hmAbbr);
      if (!matched) return;
      let pk = matched.gamePk;
      kalshi[pk] = { markets: [], ml_away: null, ml_home: null, spread: null, spreadPt: null, ou: null, ouPt: null };
      // Use first bookmaker for each market (usually DraftKings)
      (ev.bookmakers || []).slice(0, 1).forEach(bk => {
        (bk.markets || []).forEach(mkt => {
          if (mkt.key === 'h2h') {
            mkt.outcomes.forEach(o => {
              if (teamAbbr[o.name] === awAbbr) kalshi[pk].ml_away = o.price;
              if (teamAbbr[o.name] === hmAbbr) kalshi[pk].ml_home = o.price;
            });
            kalshi[pk].markets.push({ ticker: 'ml', title: 'Moneyline: ' + awAbbr + ' vs ' + hmAbbr, type: 'ml', book: bk.title });
          }
          if (mkt.key === 'spreads') {
            mkt.outcomes.forEach(o => {
              if (teamAbbr[o.name] === awAbbr) { kalshi[pk].spread = o.price; kalshi[pk].spreadPt = o.point; }
            });
            let pts = mkt.outcomes[0]?.point || '';
            kalshi[pk].markets.push({ ticker: 'spread', title: 'Run Line ' + pts, type: 'spread', book: bk.title, outcomes: mkt.outcomes.map(o => ({name: teamAbbr[o.name]||o.name, price: o.price, point: o.point})) });
          }
          if (mkt.key === 'totals') {
            let overLine = mkt.outcomes.find(o => o.name === 'Over');
            let underLine = mkt.outcomes.find(o => o.name === 'Under');
            if (overLine) { kalshi[pk].ou = overLine.price; kalshi[pk].ouPt = overLine.point; }
            kalshi[pk].markets.push({ ticker: 'totals', title: 'Total ' + (overLine?.point||''), type: 'totals', book: bk.title, outcomes: mkt.outcomes.map(o => ({name: o.name, price: o.price, point: o.point})) });
          }
        });
      });
    });
    console.log('Odds loaded:', Object.keys(kalshi).length, 'games matched');
  } catch(e) { console.warn('Odds error:', e); }
} // player_id -> {xba, xslg, xwoba, ev, brl}

// --- Savant CSV loader ---
async function loadSavant() {
  try {
    let [r1, r2, r3] = await Promise.all([
      fetch('https://baseballsavant.mlb.com/leaderboard/expected_statistics?type=batter&year=2026&position=&team=&min=10&csv=true').catch(()=>null),
      fetch('https://baseballsavant.mlb.com/leaderboard/expected_statistics?type=pitcher&year=2026&position=&team=&min=10&csv=true').catch(()=>null),
      fetch('https://baseballsavant.mlb.com/leaderboard/statcast?type=batter&year=2026&position=&team=&min=q&csv=true').catch(()=>null)
    ]);

    // Parse batter expected stats (xBA, xSLG, xwOBA)
    if (r1 && r1.ok) {
      let text = await r1.text();
      parseCSV(text, (headers, cols, pid) => {
        if (!savant[pid]) savant[pid] = {};
        savant[pid].xba = findCol(headers, cols, ['est_ba','xba','expected_ba']);
        savant[pid].xslg = findCol(headers, cols, ['est_slg','xslg','expected_slg']);
        savant[pid].xwoba = findCol(headers, cols, ['est_woba','xwoba','expected_woba']);
      });
    }

    // Parse pitcher expected stats (xFIP, xERA, xwOBA against)
    if (r2 && r2.ok) {
      let text = await r2.text();
      parseCSV(text, (headers, cols, pid) => {
        if (!savantPit[pid]) savantPit[pid] = {};
        savantPit[pid].xwoba = findCol(headers, cols, ['est_woba','xwoba','expected_woba']);
        savantPit[pid].xera = findCol(headers, cols, ['xera','est_era','expected_era']);
        // xFIP not always on expected_statistics — try to find it
        savantPit[pid].xfip = findCol(headers, cols, ['xfip','expected_fip']);
      });
      console.log('Savant pitchers (expected):', Object.keys(savantPit).length);
    }

    // Parse batter statcast (EV, barrel rate)
    if (r3 && r3.ok) {
      let text = await r3.text();
      parseCSV(text, (headers, cols, pid) => {
        if (!savant[pid]) savant[pid] = {};
        savant[pid].ev = findCol(headers, cols, ['avg_hit_speed','exit_velocity','avg_exit_velocity','ev','launch_speed']);
        savant[pid].brl = findCol(headers, cols, ['brl_percent','barrel_batted_rate','brl_pa','barrel_pct','barrels_per_pa_percent']);
      });
    }

    console.log('Savant batters:', Object.keys(savant).length);
  } catch(e) { console.warn('Savant error:', e); }
}

// Also try the statcast pitcher leaderboard for xFIP
async function loadSavantPitXFIP() {
  try {
    let r = await fetch('https://baseballsavant.mlb.com/leaderboard/statcast?type=pitcher&year=2026&position=&team=&min=q&csv=true').catch(()=>null);
    if (r && r.ok) {
      let text = await r.text();
      parseCSV(text, (headers, cols, pid) => {
        if (!savantPit[pid]) savantPit[pid] = {};
        let xfip = findCol(headers, cols, ['xfip','expected_fip','xfip_value']);
        if (xfip) savantPit[pid].xfip = xfip;
        // Pitch mix percentages
        savantPit[pid].ff_pct = findCol(headers, cols, ['ff_pct','pitch_pct_ff','fastball_pct','fa_pct']);
        savantPit[pid].sl_pct = findCol(headers, cols, ['sl_pct','pitch_pct_sl','slider_pct']);
        savantPit[pid].cu_pct = findCol(headers, cols, ['cu_pct','pitch_pct_cu','curve_pct','cb_pct']);
        savantPit[pid].ch_pct = findCol(headers, cols, ['ch_pct','pitch_pct_ch','changeup_pct']);
        savantPit[pid].si_pct = findCol(headers, cols, ['si_pct','pitch_pct_si','sinker_pct']);
        savantPit[pid].fc_pct = findCol(headers, cols, ['fc_pct','pitch_pct_fc','cutter_pct']);
      });
      console.log('Savant pitcher statcast:', Object.keys(savantPit).length);
    }
  } catch(e) { console.warn('Savant pitcher statcast error:', e); }
}

// wRC+ approximation from wOBA (2026 league constants)
function calcWRCplus(woba) {
  if (woba == null) return null;
  let lgWoba = 0.310, scale = 1.15, lgRPA = 0.120;
  return (((woba - lgWoba) / scale + lgRPA) / lgRPA) * 100;
}

function parseCSV(text, callback) {
  let lines = text.split('\n');
  if (lines.length < 2) return;
  let headers = lines[0].split(',').map(h => h.trim().replace(/"/g, '').toLowerCase());
  let piCol = headers.indexOf('player_id');
  if (piCol < 0) { console.warn('No player_id column. Headers:', headers.join(', ')); return; }
  for (let i = 1; i < lines.length; i++) {
    if (!lines[i].trim()) continue;
    let cols = lines[i].split(',').map(c => c.trim().replace(/"/g, ''));
    let pid = cols[piCol];
    if (pid) callback(headers, cols, pid);
  }
}

function findCol(headers, cols, names) {
  for (let name of names) {
    let idx = headers.indexOf(name.toLowerCase());
    if (idx >= 0 && cols[idx] && cols[idx] !== '' && cols[idx] !== 'null') return cols[idx];
  }
  return null;
}

// --- Helpers ---
function $(id) { return document.getElementById(id); }

function showLoading(step, total, label, estSec) {
  let pct = Math.round((step / total) * 100);
  let remaining = Math.max(0, Math.round(estSec * (1 - step/total)));
  $('app').innerHTML = '<div class="loader"><div class="spin"></div>' +
    '<div class="pbar-wrap"><div class="pbar" style="width:'+pct+'%"></div></div>' +
    '<div class="pstep">'+label+'</div>' +
    '<div class="pest">'+pct+'% · ~'+remaining+'s remaining</div></div>';
}

function updateProgress(step, total, label, estSec) {
  let pct = Math.round((step / total) * 100);
  let remaining = Math.max(0, Math.round(estSec * (1 - step/total)));
  let bar = document.querySelector('.pbar');
  let stepEl = document.querySelector('.pstep');
  let estEl = document.querySelector('.pest');
  if (bar) bar.style.width = pct + '%';
  if (stepEl) stepEl.textContent = label;
  if (estEl) estEl.textContent = pct + '% · ~' + remaining + 's remaining';
}
function fmt(v, d) { return v == null || isNaN(+v) ? '—' : (+v).toFixed(d || 3); }
function wColor(w) { if (w == null) return 't2'; let n = +w; return n > .37 ? 'amb' : n > .34 ? 'grn' : n < .26 ? 'sky' : n < .30 ? 'red' : 't2'; }
function eColor(v) { if (v == null) return 't2'; let n = +v; return n < 3.5 ? 'grn' : n > 4.5 ? 'red' : 't2'; }
function prettyDate() { return new Date(date+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}); }

function calcWOBA(s) {
  if (!s) return null;
  let si = (s.hits||0) - (s.doubles||0) - (s.triples||0) - (s.homeRuns||0);
  let num = .69*((s.baseOnBalls||0)-(s.intentionalWalks||0)) + .72*(s.hitByPitch||0) + .88*si + 1.24*(s.doubles||0) + 1.57*(s.triples||0) + 2.01*(s.homeRuns||0);
  let den = (s.atBats||0) + (s.baseOnBalls||0) - (s.intentionalWalks||0) + (s.sacFlies||0) + (s.hitByPitch||0);
  return den > 0 ? num / den : null;
}
function calcFIP(s) {
  if (!s) return null;
  let ip = parseFloat(s.inningsPitched || 0);
  if (!ip) return null;
  return (13*(s.homeRuns||0) + 3*((s.baseOnBalls||0)+(s.hitByPitch||0)) - 2*(s.strikeOuts||0)) / ip + 3.10;
}

async function api(path) {
  try {
    let r = await fetch(BASE + path);
    if (!r.ok) throw new Error(r.status);
    return await r.json();
  } catch(e) {
    console.error('API error:', path, e);
    return null;
  }
}

// --- Navigation ---
function renderNav() {
  if (mode === 'list') {
    $('nav').innerHTML = `<div class="nav"><button class="nav" onclick="shiftDate(-1)">←</button><div class="mid">${prettyDate()}</div><button class="nav" onclick="shiftDate(1)">→</button></div>`;
  } else {
    let g = games[sel];
    let a = g.teams.away.team.abbreviation, h = g.teams.home.team.abbreviation;
    $('nav').innerHTML = `<div class="nav"><button onclick="prevGame()">←</button><div class="mid"><b>${a} @ ${h}</b><span style="font-size:9px">${sel+1} of ${games.length}</span></div><button onclick="nextGame()">→</button></div>`;
  }
}

function shiftDate(dir) {
  let d = new Date(date+'T12:00:00');
  d.setDate(d.getDate() + dir);
  date = d.toISOString().slice(0,10);
  load();
}

async function nextGame() {
  if (sel < games.length - 1) { openGame(sel + 1); }
  else {
    let d = new Date(date+'T12:00:00'); d.setDate(d.getDate()+1); date = d.toISOString().slice(0,10);
    await loadGamesQuiet();
    if (games.length) openGame(0); else { mode = 'list'; renderNav(); $('app').innerHTML = '<p class="err">No games next day</p>'; }
  }
}

async function prevGame() {
  if (sel > 0) { openGame(sel - 1); }
  else {
    let d = new Date(date+'T12:00:00'); d.setDate(d.getDate()-1); date = d.toISOString().slice(0,10);
    await loadGamesQuiet();
    if (games.length) openGame(games.length - 1); else { mode = 'list'; renderNav(); $('app').innerHTML = '<p class="err">No games previous day</p>'; }
  }
}

// --- Load Schedule ---
async function loadGamesQuiet() {
  let data = await api('/api/v1/schedule?sportId=1&date=' + date + '&hydrate=probablePitcher,linescore,team');
  games = data?.dates?.[0]?.games || [];
  games.sort((a,b) => new Date(a.gameDate) - new Date(b.gameDate));
  kalshi = {};
  await loadOdds();
}

async function load() {
  mode = 'list'; sel = null; renderNav();
  $('sub').textContent = 'LOADING...';
  let hasSavant = Object.keys(savant).length > 0;
  let totalSteps = hasSavant ? 2 : 3;
  showLoading(0, totalSteps, 'Fetching MLB schedule...', hasSavant ? 3 : 6);

  // Step 1: Schedule
  let data = await api('/api/v1/schedule?sportId=1&date=' + date + '&hydrate=probablePitcher,linescore,team');
  updateProgress(1, totalSteps, 'Schedule loaded', hasSavant ? 3 : 6);

  // Step 2: Savant (if not cached)
  if (!hasSavant) {
    updateProgress(1, totalSteps, 'Downloading Savant Statcast data...', 6);
    await loadSavant();
    await loadSavantPitXFIP();
    updateProgress(2, totalSteps, 'Savant loaded', 6);
  }

  if (!data || !data.dates || !data.dates[0]) {
    $('app').innerHTML = '<div class="err">No games found<br><button onclick="load()">Retry</button></div>';
    $('sub').textContent = 'NO GAMES';
    renderNav();
    return;
  }
  games = data.dates[0].games || [];
  games.sort((a,b) => new Date(a.gameDate) - new Date(b.gameDate));

  // Step 3: Odds lines
  kalshi = {};
  await loadOdds();

  let svCount = Object.keys(savant).length;
  let kCount = Object.keys(kalshi).length;
  let statusParts = [games.length + ' GAMES'];
  if (svCount) statusParts.push('SAVANT ✓');
  if (kCount) statusParts.push('ODDS ✓');
  $('sub').textContent = statusParts.join(' · ');
  renderNav();
  renderList();

  // Background: scan all games for edge scores
  edgeCache = {};
  scanAllEdges();
}

// --- Full edge scan for all games (new 8-metric system) ---
async function scanAllEdges() {
  $('sub').textContent += ' · SCANNING EDGES...';

  // Venue ID map
  const VENUE = {
    'NYY':3313,'NYM':3289,'LAD':22,'SD':2680,'LAA':1,'HOU':2392,'TEX':5325,
    'SEA':680,'ATH':10,'BOS':3,'TB':12,'TOR':14,'BAL':2,'MIN':3312,
    'CLE':5,'DET':2394,'CWS':4,'KC':7,'ATL':4705,'PHI':2681,
    'WSH':3309,'MIA':4169,'CHC':17,'CIN':2602,'MIL':32,'PIT':31,'STL':2889,
    'SF':2395,'AZ':15,'COL':19
  };

  // Phase 1: Collect all pitcher IDs
  let pitcherIds = {};
  games.forEach(g => {
    if (g.teams.away.probablePitcher) pitcherIds[g.teams.away.probablePitcher.id] = 1;
    if (g.teams.home.probablePitcher) pitcherIds[g.teams.home.probablePitcher.id] = 1;
  });
  let pitIds = Object.keys(pitcherIds);
  let teamIds = [...new Set(games.flatMap(g => [g.teams.away.team.id, g.teams.home.team.id]))];

  // Fetch pitcher stats + game logs + team data in parallel
  let [pitStatResults, pitLogResults, rosterResults, depthResults, seasonResults] = await Promise.all([
    Promise.all(pitIds.map(id => api('/api/v1/people/'+id+'?hydrate=stats(group=[pitching],type=[season],season=2026)'))),
    Promise.all(pitIds.map(id => api('/api/v1/people/'+id+'/stats?stats=gameLog&group=pitching&season=2026'))),
    Promise.all(teamIds.map(id => api('/api/v1/teams/'+id+'/roster?rosterType=active'))),
    Promise.all(teamIds.map(id => api('/api/v1/teams/'+id+'/roster/depthChart'))),
    Promise.all(teamIds.map(id => api('/api/v1/teams/'+id+'/stats?stats=season&group=hitting&season=2026')))
  ]);

  // Build pitcher map
  let pitMap = {};
  pitIds.forEach((id, i) => {
    let p = pitStatResults[i]?.people?.[0];
    let logs = pitLogResults[i]?.stats?.[0]?.splits || [];
    let sv = savantPit[id] || {};
    pitMap[id] = {
      stat: p?.stats?.[0]?.splits?.[0]?.stat || null,
      hand: p?.pitchHand?.code || null,
      gameLogs: logs,
      xfip: sv.xfip ? +sv.xfip : null,
      xwoba: sv.xwoba || null,
      ff_pct: sv.ff_pct, sl_pct: sv.sl_pct, cu_pct: sv.cu_pct, ch_pct: sv.ch_pct
    };
  });

  // Build team maps
  let rosterMap = {}, depthMap = {}, seasonWobaMap = {};
  teamIds.forEach((id, i) => {
    rosterMap[id] = (rosterResults[i]?.roster || []).filter(p => p.position?.type !== 'Pitcher').map(p => p.person.id);
    depthMap[id] = depthResults[i]?.roster || [];
    seasonWobaMap[id] = calcWOBA(seasonResults[i]?.stats?.[0]?.splits?.[0]?.stat);
  });

  // Team xwOBA from Savant
  let teamXwobaMap = {};
  teamIds.forEach(id => {
    let pIds = rosterMap[id] || [];
    let xws = pIds.map(pid => savant[pid]?.xwoba).filter(x => x != null).map(Number);
    teamXwobaMap[id] = xws.length >= 3 ? xws.reduce((a,b)=>a+b,0)/xws.length : null;
  });

  // Identify high-leverage bullpen arms per team
  function getHLArms(teamId) {
    let depth = depthMap[teamId] || [];
    let arms = [];
    depth.forEach(p => {
      let pos = p.position?.abbreviation || '';
      if (['CL','SU','RP','MR'].includes(pos) && p.person?.id) arms.push(p.person.id);
    });
    return [...new Set(arms)].slice(0, 4);
  }

  // Fetch bullpen arm stats
  let allBPArmIds = [...new Set(teamIds.flatMap(id => getHLArms(id)))];
  let bpStatResults = await Promise.all(allBPArmIds.map(id =>
    api('/api/v1/people/'+id+'?hydrate=stats(group=[pitching],type=[season],season=2026)')
  ));
  let allBPArms = {};
  allBPArmIds.forEach((id, i) => {
    let p = bpStatResults[i]?.people?.[0];
    let st = p?.stats?.[0]?.splits?.[0]?.stat;
    let sv = savantPit[id] || {};
    allBPArms[id] = {
      name: p?.fullName || '?',
      stat: st, fip: calcFIP(st),
      xfip: sv.xfip ? +sv.xfip : null,
      hand: p?.pitchHand?.code || null
    };
  });

  // Phase 2: Compute edge for every game
  function clamp(v, max) { return Math.max(-max, Math.min(max, v)); }

  games.forEach(g => {
    let aw = g.teams.away, hm = g.teams.home;
    let apData = aw.probablePitcher ? pitMap[aw.probablePitcher.id] : null;
    let hpData = hm.probablePitcher ? pitMap[hm.probablePitcher.id] : null;
    let parkF = PARK[hm.team.abbreviation] || 1.00;
    let venueId = VENUE[hm.team.abbreviation] || null;

    function buildEdge(teamId, oppPitData, oppTeamId) {
      let score = 0, breakdown = [];

      // 1. Opp Starter xFIP
      if (oppPitData) {
        let xfip = oppPitData.xfip;
        let fip = oppPitData.stat ? calcFIP(oppPitData.stat) : null;
        let val = xfip || fip;
        if (val != null) {
          let pts = clamp((val - 4.20) * 3, 10);
          score += pts;
          let q = val < 2.8 ? 'elite arm' : val < 3.5 ? 'strong arm' : val < 4.2 ? 'avg pitcher' : 'hittable pitcher';
          breakdown.push({ label: 'Opp. Starter xFIP', value: val.toFixed(2)+(xfip?' (Savant)':' (FIP)'), pts: (pts>0?'+':'')+pts.toFixed(1), note: 'facing '+q, color: val > 4.2 ? '#34d399' : val < 3.5 ? '#f87171' : '#a1a1aa' });
        } else {
          breakdown.push({ label: 'Opp. Starter xFIP', value: 'N/A', pts: '—', note: 'no data', color: '#52525b' });
        }

        // 2. Pitcher park history
        if (venueId && oppPitData.gameLogs?.length) {
          let vg = oppPitData.gameLogs.filter(gl => gl.venue?.id === venueId);
          if (vg.length >= 2) {
            let totIP = vg.reduce((s,g) => s + parseFloat(g.stat?.inningsPitched||0), 0);
            let totER = vg.reduce((s,g) => s + (g.stat?.earnedRuns||0), 0);
            let venERA = totIP > 0 ? (totER / totIP * 9) : null;
            if (venERA != null) {
              let pts = clamp((venERA - 4.20) * 1.5, 5);
              score += pts;
              breakdown.push({ label: 'Pitcher Park Hist.', value: venERA.toFixed(2)+' ERA ('+vg.length+' GS)', pts: (pts>0?'+':'')+pts.toFixed(1), note: venERA > 5 ? 'struggles here' : venERA < 3 ? 'dominant here' : 'avg here', color: venERA > 5 ? '#34d399' : venERA < 3 ? '#f87171' : '#a1a1aa' });
            } else {
              breakdown.push({ label: 'Pitcher Park Hist.', value: 'N/A', pts: '—', note: 'no IP at venue', color: '#52525b' });
            }
          } else {
            breakdown.push({ label: 'Pitcher Park Hist.', value: vg.length+' GS', pts: '—', note: 'too few starts', color: '#52525b' });
          }
        } else {
          breakdown.push({ label: 'Pitcher Park Hist.', value: 'N/A', pts: '—', note: 'no venue data', color: '#52525b' });
        }
      } else {
        breakdown.push({ label: 'Opp. Starter xFIP', value: 'TBD', pts: '—', note: 'pitcher TBD', color: '#52525b' });
        breakdown.push({ label: 'Pitcher Park Hist.', value: 'TBD', pts: '—', note: 'pitcher TBD', color: '#52525b' });
      }

      // 3. BvP vs Starter (placeholder for main page)
      breakdown.push({ label: 'BvP vs Starter', value: '—', pts: '—', note: 'drill into game for matchup data', color: '#52525b' });

      // 4. Lineup wRC+
      let w = seasonWobaMap[teamId];
      let wrc = calcWRCplus(w);
      if (wrc != null) {
        let pts = clamp((wrc - 100) * 0.15, 6);
        score += pts;
        let q = wrc > 115 ? 'elite lineup' : wrc > 105 ? 'above avg' : wrc > 95 ? 'avg lineup' : 'below avg';
        breakdown.push({ label: 'Lineup wRC+', value: Math.round(wrc)+'', pts: (pts>0?'+':'')+pts.toFixed(1), note: q, color: wrc > 105 ? '#34d399' : wrc < 95 ? '#f87171' : '#a1a1aa' });
      } else {
        breakdown.push({ label: 'Lineup wRC+', value: 'N/A', pts: '—', note: 'no data', color: '#52525b' });
      }

      // 5. Lineup xwOBA
      let xw = teamXwobaMap[teamId];
      if (xw != null) {
        let pts = clamp((xw - 0.310) * 40, 6);
        score += pts;
        let q = xw > .340 ? 'elite contact' : xw > .320 ? 'above avg' : xw > .300 ? 'avg contact' : 'weak contact';
        breakdown.push({ label: 'Lineup xwOBA', value: xw.toFixed(3), pts: (pts>0?'+':'')+pts.toFixed(1), note: q, color: xw > .320 ? '#34d399' : xw < .300 ? '#f87171' : '#a1a1aa' });
      } else {
        breakdown.push({ label: 'Lineup xwOBA', value: 'N/A', pts: '—', note: 'need Savant data', color: '#52525b' });
      }

      // 6. Opp Bullpen (high-leverage arms quality)
      let bpIds = getHLArms(oppTeamId);
      let bpFips = bpIds.map(id => allBPArms[id]).filter(a => a && (a.xfip || a.fip));
      if (bpFips.length) {
        let avgFip = bpFips.reduce((s,a) => s + (a.xfip || a.fip), 0) / bpFips.length;
        let pts = clamp((avgFip - 3.80) * 2, 5);
        score += pts;
        let names = bpFips.map(a => a.name.split(' ').pop()).join(', ');
        breakdown.push({ label: 'Opp. Bullpen (HL)', value: avgFip.toFixed(2)+' xFIP', pts: (pts>0?'+':'')+pts.toFixed(1), note: (avgFip > 4.2 ? 'weak pen' : avgFip < 3.2 ? 'elite pen' : 'avg pen')+' ('+names+')', color: avgFip > 4.2 ? '#34d399' : avgFip < 3.2 ? '#f87171' : '#a1a1aa' });
      } else {
        breakdown.push({ label: 'Opp. Bullpen (HL)', value: 'N/A', pts: '—', note: 'no bullpen data', color: '#52525b' });
      }

      // 7. Park Factor
      let parkPts = clamp((parkF - 1.0) * 5, 2);
      score += parkPts;
      breakdown.push({ label: 'Park Factor', value: parkF.toFixed(2), pts: (parkPts>0?'+':'')+parkPts.toFixed(1), note: parkF > 1.02 ? 'hitter friendly' : parkF < 0.98 ? 'pitcher friendly' : 'neutral', color: parkF > 1.02 ? '#34d399' : parkF < 0.98 ? '#38bdf8' : '#52525b' });

      return { score, breakdown };
    }

    let awEdge = buildEdge(aw.team.id, hpData, hm.team.id);
    let hmEdge = buildEdge(hm.team.id, apData, aw.team.id);

    edgeCache[g.gamePk] = {
      awScore: awEdge.score, hmScore: hmEdge.score,
      awAbbr: aw.team.abbreviation, hmAbbr: hm.team.abbreviation,
      full: true
    };
  });

  let svCount = Object.keys(savant).length;
  let kCount = Object.keys(kalshi).length;
  let statusParts = [games.length + ' GAMES'];
  if (svCount) statusParts.push('SAVANT ✓');
  if (kCount) statusParts.push('ODDS ✓');
  statusParts.push('EDGE ✓');
  $('sub').textContent = statusParts.join(' · ');
  renderList();
}


function renderList() {
  let html = '';
  // Picks summary (filtered to current date)
  let dayPicks = getPicksForDate(date);
  if (dayPicks.length) {
    html += '<div style="background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.15);border-radius:8px;padding:8px;margin-bottom:10px">';
    html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px"><span style="font-size:9px;color:#f59e0b;letter-spacing:1px">MY PICKS · ' + dayPicks.length + ' ACTIVE</span>';
    html += '<button style="background:none;border:1px solid rgba(245,158,11,.3);color:#f59e0b;border-radius:4px;padding:2px 8px;font-size:8px;cursor:pointer" onclick="clearAllPicks()">CLEAR ALL</button></div>';
    dayPicks.forEach(([k, p]) => {
      html += '<span class="pick-tag" style="margin:2px;cursor:pointer" onclick="event.stopPropagation();delete picks[\''+k+'\'];savePicks();renderList()">🎯 ' + p.label + ' ✕</span>';
    });
    html += '</div>';
  }
  games.forEach((g, i) => {
    let aw = g.teams.away, hm = g.teams.home;
    let ap = aw.probablePitcher, hp = hm.probablePitcher;
    let time = new Date(g.gameDate).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
    let st = g.status?.abstractGameState || '';
    let isL = st === 'Live', isF = st === 'Final';
    let ls = g.linescore;

    html += `<button class="card ${isL?'live':''}" onclick="openGame(${i})">`;
    html += `<div style="display:flex;justify-content:space-between;margin-bottom:3px"><div style="font-size:12px;font-weight:700">${aw.team.abbreviation}<span style="color:#3f3f46;margin:0 4px">@</span>${hm.team.abbreviation}`;
    if (isL) html += `<span class="badge blv">${ls?.isTopInning?'▲':'▼'} ${ls?.currentInningOrdinal||''}</span>`;
    else if (isF) html += `<span class="badge bfn">FINAL</span>`;
    html += `</div><span style="font-size:9px;color:#52525b">${time}</span></div>`;
    html += `<div style="font-size:9px;color:#a1a1aa">${ap?ap.fullName:'TBD'} vs ${hp?hp.fullName:'TBD'}</div>`;

    if (ls && (isL || isF)) {
      let aR = ls.teams?.away?.runs ?? 0, hR = ls.teams?.home?.runs ?? 0;
      html += `<div class="scorebar"><span style="font-size:11px;font-weight:600">${aw.team.abbreviation}</span><span class="num ${isF&&aR>hR?'w':''}">${aR}</span><span style="font-size:9px;color:${isL?'#a3e635':'#52525b'}">${isL?((ls.isTopInning?'▲':'▼')+' '+(ls.currentInningOrdinal||'')):g.status?.detailedState||''}</span><span class="num ${isF&&hR>aR?'w':''}">${hR}</span><span style="font-size:11px;font-weight:600">${hm.team.abbreviation}</span></div>`;
    }
    // Edge score preview (from cache) — shows DELTA between teams
    let ec = edgeCache[g.gamePk];
    if (ec) {
      let absDiff = Math.abs(ec.awScore - ec.hmScore);
      let favAbbr = ec.awScore >= ec.hmScore ? ec.awAbbr : ec.hmAbbr;
      let color = absDiff > 15 ? '#34d399' : absDiff > 8 ? '#f59e0b' : '#52525b';
      let strength = absDiff > 15 ? 'STRONG' : absDiff > 8 ? 'MOD' : absDiff > 3 ? 'SLIGHT' : 'EVEN';
      let label = 'EDGE';
      html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-top:4px;padding:3px 6px;background:rgba(245,158,11,.06);border-radius:4px"><span style="font-size:8px;color:#a1a1aa;letter-spacing:.5px">'+label+'</span><span style="font-size:9px;font-weight:700;font-family:monospace;color:'+color+'">'+(absDiff > 3 ? strength+' '+favAbbr+' Δ'+absDiff.toFixed(1) : 'EVEN Δ'+absDiff.toFixed(1))+'</span></div>';
    }
    // Odds lines preview
    let kd = kalshi[g.gamePk];
    if (kd) {
      html += '<div class="kline">';
      if (kd.ml_away != null) html += '<span class="kbtn">' + aw.team.abbreviation + ' ' + (kd.ml_away > 0 ? '+' : '') + kd.ml_away + '</span>';
      if (kd.ml_home != null) html += '<span class="kbtn">' + hm.team.abbreviation + ' ' + (kd.ml_home > 0 ? '+' : '') + kd.ml_home + '</span>';
      if (kd.ouPt != null) html += '<span class="kbtn">O/U ' + kd.ouPt + '</span>';
      if (kd.spreadPt != null) html += '<span class="kbtn">RL ' + (kd.spreadPt > 0 ? '+' : '') + kd.spreadPt + '</span>';
      html += '</div>';
    }
    // Show picks for this game (date filtered)
    let gamePicks = Object.entries(picks).filter(([k, p]) => k.startsWith(g.gamePk + '_') && p.date === date);
    if (gamePicks.length) {
      html += '<div style="margin-top:4px">';
      gamePicks.forEach(([k, p]) => { html += '<span class="pick-tag">🎯 ' + p.label + '</span>'; });
      html += '</div>';
    }
    html += `</button>`;
  });
  $('app').innerHTML = html;
}

// --- Open Game Detail ---
async function openGame(i) {
  mode = 'detail'; sel = i;
  renderNav();
  let g = games[i];
  let totalBatters = 18;
  let totalSteps = 3 + totalBatters + 5; // pitchers + feed + batters + edge data
  showLoading(0, totalSteps, 'Fetching pitcher stats...', 20);

  try {
    let aw = g.teams.away, hm = g.teams.home;
    let ap = aw.probablePitcher, hp = hm.probablePitcher;
    let isL = g.status?.abstractGameState === 'Live';
    let isF = g.status?.abstractGameState === 'Final';
    let ls = g.linescore;

    // Step 1-2: Fetch pitcher season stats
    let [apData, hpData] = await Promise.all([
      ap ? api('/api/v1/people/'+ap.id+'?hydrate=stats(group=[pitching],type=[season],season=2026)') : null,
      hp ? api('/api/v1/people/'+hp.id+'?hydrate=stats(group=[pitching],type=[season],season=2026)') : null
    ]);
    let apS = apData?.people?.[0]?.stats?.[0]?.splits?.[0]?.stat || null;
    let hpS = hpData?.people?.[0]?.stats?.[0]?.splits?.[0]?.stat || null;
    let apHand = apData?.people?.[0]?.pitchHand?.code || null; // R or L
    let hpHand = hpData?.people?.[0]?.pitchHand?.code || null;
    updateProgress(2, totalSteps, 'Pitchers loaded · Fetching lineup...', 15);

    // Step 3: Live feed
    let feed = await api('/api/v1.1/game/'+g.gamePk+'/feed/live');
    let box = feed?.liveData?.boxscore;
    let plays = feed?.liveData?.plays;
    let lsd = feed?.liveData?.linescore;
    let curBatId = plays?.currentPlay?.matchup?.batter?.id || null;
    updateProgress(3, totalSteps, 'Lineup loaded · Fetching batter stats...', 15);

    // Extract batting order IDs and basic info from boxscore
    function getLineup(side) {
      if (!box) return [];
      let info = box.teams?.[side];
      if (!info) return [];
      let order = info.battingOrder || [];
      return order.map(id => {
        let p = info.players?.['ID'+id];
        if (!p) return null;
        let gs = p.stats?.batting || {};
        return {
          id: id,
          name: p.person?.fullName || '?',
          pos: p.position?.abbreviation || '—',
          gH: gs.hits, gAB: gs.atBats, gR: gs.runs, gRBI: gs.rbi, gHR: gs.homeRuns
        };
      }).filter(Boolean);
    }

    let awBat = getLineup('away');
    let hmBat = getLineup('home');
    let awConfirmed = awBat.length > 0;
    let hmConfirmed = hmBat.length > 0;

    // Fallback: build probable lineup from depth chart
    async function getDepthChartLineup(teamId) {
      // Try depth chart first
      let dc = await api('/api/v1/teams/'+teamId+'/roster/depthChart');
      if (dc?.roster && dc.roster.length) {
        // Group by position, take the first (starter) at each batting position
        let posOrder = ['C','1B','2B','3B','SS','LF','CF','RF','DH'];
        let byPos = {};
        dc.roster.forEach(p => {
          let pos = p.position?.abbreviation;
          if (pos && !byPos[pos]) byPos[pos] = p;
        });
        let lineup = [];
        let usedIds = new Set();
        posOrder.forEach(pos => {
          if (byPos[pos] && !usedIds.has(byPos[pos].person.id)) {
            lineup.push({ id: byPos[pos].person.id, name: byPos[pos].person.fullName, pos: pos });
            usedIds.add(byPos[pos].person.id);
          }
        });
        if (lineup.length >= 7) return lineup;
      }
      // Final fallback: active roster
      let r = await api('/api/v1/teams/'+teamId+'/roster?rosterType=active');
      if (r?.roster) return r.roster.filter(p=>p.position?.type!=='Pitcher').slice(0,9).map(p=>({id:p.person.id,name:p.person.fullName,pos:p.position.abbreviation}));
      return [];
    }

    if (!awBat.length) {
      updateProgress(3, totalSteps, 'Building '+aw.team.abbreviation+' lineup from depth chart...', 15);
      awBat = await getDepthChartLineup(aw.team.id);
    }
    if (!hmBat.length) {
      updateProgress(3, totalSteps, 'Building '+hm.team.abbreviation+' lineup from depth chart...', 15);
      hmBat = await getDepthChartLineup(hm.team.id);
    }

    // Fetch season stats + BvP for each batter with progress tracking
    // Tag each batter with their opposing pitcher
    awBat.forEach(b => b._oppPid = hp?.id || null);
    hmBat.forEach(b => b._oppPid = ap?.id || null);
    let allBatters = [...awBat, ...hmBat];
    totalSteps = 3 + allBatters.length;
    let completed = 3;

    async function enrichBatter(b) {
      let [data, bvpData] = await Promise.all([
        api('/api/v1/people/'+b.id+'?hydrate=stats(group=[hitting],type=[season],season=2026)'),
        b._oppPid ? api('/api/v1/people/'+b.id+'/stats?stats=vsPlayer&opposingPlayerId='+b._oppPid+'&group=hitting&sportId=1') : null
      ]);
      let ss = data?.people?.[0]?.stats?.[0]?.splits?.[0]?.stat || null;
      let sv = savant[b.id] || null;
      // Combine BvP splits
      let bvpSplits = bvpData?.stats?.[0]?.splits || [];
      let bvpCombined = null;
      if (bvpSplits.length) {
        bvpCombined = {};
        bvpSplits.forEach(sp => { let s = sp.stat; Object.keys(s).forEach(k => { if (typeof s[k] === 'number') bvpCombined[k] = (bvpCombined[k]||0) + s[k]; }); });
      }
      completed++;
      updateProgress(completed, totalSteps, 'Loading ' + b.name + '... (' + completed + '/' + totalSteps + ')', 15);
      return { ...b, avg: ss?.avg||null, ops: ss?.ops||null, woba: calcWOBA(ss),
        xwoba: sv?.xwoba||null,
        bvpWoba: calcWOBA(bvpCombined), bvpAB: bvpCombined?.atBats||0 };
    }

    // Run ALL batter fetches in parallel across both teams
    let allResults = await Promise.all(allBatters.map(enrichBatter));
    let enrichedAw = allResults.slice(0, awBat.length);
    let enrichedHm = allResults.slice(awBat.length);

    // ========================================
    // EDGE SCORE COMPUTATION (new 8-metric system)
    // ========================================
    updateProgress(completed, totalSteps, 'Computing edge metrics...', 20);
    
    let aW=aw.leagueRecord?.wins||0, aL=aw.leagueRecord?.losses||0;
    let hW=hm.leagueRecord?.wins||0, hL=hm.leagueRecord?.losses||0;

    // Venue ID map
    const VENUE = {
      'NYY':3313,'NYM':3289,'LAD':22,'SD':2680,'LAA':1,'HOU':2392,'TEX':5325,
      'SEA':680,'ATH':10,'BOS':3,'TB':12,'TOR':14,'BAL':2,'MIN':3312,
      'CLE':5,'DET':2394,'CWS':4,'KC':7,'ATL':4705,'PHI':2681,
      'WSH':3309,'MIA':4169,'CHC':17,'CIN':2602,'MIL':32,'PIT':31,'STL':2889,
      'SF':2395,'AZ':15,'COL':19
    };
    let venueId = VENUE[hm.team.abbreviation] || null;

    // Fetch pitcher game logs for park history
    let [apLogs, hpLogs] = await Promise.all([
      ap ? api('/api/v1/people/'+ap.id+'/stats?stats=gameLog&group=pitching&season=2026') : null,
      hp ? api('/api/v1/people/'+hp.id+'/stats?stats=gameLog&group=pitching&season=2026') : null
    ]);
    let apGameLogs = apLogs?.stats?.[0]?.splits || [];
    let hpGameLogs = hpLogs?.stats?.[0]?.splits || [];

    // Get Savant pitcher data
    let apSv = ap ? (savantPit[ap.id] || {}) : {};
    let hpSv = hp ? (savantPit[hp.id] || {}) : {};
    let apXFIP = apSv.xfip ? +apSv.xfip : calcFIP(apS);
    let hpXFIP = hpSv.xfip ? +hpSv.xfip : calcFIP(hpS);

    // Fetch opponent bullpen high-leverage arms
    let [awDepth, hmDepth] = await Promise.all([
      api('/api/v1/teams/'+aw.team.id+'/roster/depthChart'),
      api('/api/v1/teams/'+hm.team.id+'/roster/depthChart')
    ]);
    
    function getHLArms(depthData) {
      let depth = depthData?.roster || [];
      let arms = [];
      depth.forEach(p => {
        let pos = p.position?.abbreviation || '';
        if (['CL','SU','RP','MR'].includes(pos) && p.person?.id) arms.push(p.person.id);
      });
      return [...new Set(arms)].slice(0, 4);
    }
    
    let hmBPIds = getHLArms(hmDepth); // away team faces home bullpen
    let awBPIds = getHLArms(awDepth); // home team faces away bullpen
    
    // Fetch bullpen arm stats
    let allBPIds = [...new Set([...hmBPIds, ...awBPIds])];
    let bpStatResults = await Promise.all(allBPIds.map(id =>
      api('/api/v1/people/'+id+'?hydrate=stats(group=[pitching],type=[season],season=2026)')
    ));
    let bpArmMap = {};
    allBPIds.forEach((id, i) => {
      let p = bpStatResults[i]?.people?.[0];
      let st = p?.stats?.[0]?.splits?.[0]?.stat;
      let sv = savantPit[id] || {};
      bpArmMap[id] = { name: p?.fullName||'?', stat: st, fip: calcFIP(st), xfip: sv.xfip?+sv.xfip:null, hand: p?.pitchHand?.code };
    });

    // BvP composite: aggregate lineup wOBA vs this pitcher
    function bvpComposite(batters) {
      let bvps = batters.filter(b => b.bvpWoba != null && b.bvpAB >= 3);
      if (!bvps.length) return null;
      let total = bvps.reduce((s,b) => s + b.bvpWoba * b.bvpAB, 0);
      let totalAB = bvps.reduce((s,b) => s + b.bvpAB, 0);
      return { woba: total / totalAB, count: bvps.length, ab: totalAB };
    }
    let awBvP = bvpComposite(enrichedAw);
    let hmBvP = bvpComposite(enrichedHm);

    // Lineup xwOBA from individual batters
    function lineupXwoba(batters) {
      let xws = batters.filter(b => b.xwoba != null).map(b => +b.xwoba);
      return xws.length >= 3 ? xws.reduce((a,b)=>a+b,0)/xws.length : null;
    }
    function lineupWoba(batters) {
      let ws = batters.filter(b => b.woba != null).map(b => b.woba);
      return ws.length ? ws.reduce((a,b)=>a+b,0)/ws.length : null;
    }

    function clamp(v, max) { return Math.max(-max, Math.min(max, v)); }

    function computeEdge(batters, oppPitXFIP, oppPitLogs, bvpData, oppBPIds, parkF) {
      let score = 0, breakdown = [];

      // 1. Opp Starter xFIP
      if (oppPitXFIP != null) {
        let pts = clamp((oppPitXFIP - 4.20) * 3, 10);
        score += pts;
        let q = oppPitXFIP < 2.8 ? 'elite arm' : oppPitXFIP < 3.5 ? 'strong arm' : oppPitXFIP < 4.2 ? 'avg pitcher' : 'hittable pitcher';
        breakdown.push({ label: 'Opp. Starter xFIP', value: oppPitXFIP.toFixed(2), pts: (pts>0?'+':'')+pts.toFixed(1), note: 'facing '+q, color: oppPitXFIP > 4.2 ? '#34d399' : oppPitXFIP < 3.5 ? '#f87171' : '#a1a1aa' });
      } else {
        breakdown.push({ label: 'Opp. Starter xFIP', value: 'TBD', pts: '—', note: 'pitcher TBD', color: '#52525b' });
      }

      // 2. Pitcher park history
      if (venueId && oppPitLogs?.length) {
        let vg = oppPitLogs.filter(gl => gl.venue?.id === venueId);
        if (vg.length >= 2) {
          let totIP = vg.reduce((s,g) => s + parseFloat(g.stat?.inningsPitched||0), 0);
          let totER = vg.reduce((s,g) => s + (g.stat?.earnedRuns||0), 0);
          let venERA = totIP > 0 ? (totER / totIP * 9) : null;
          if (venERA != null) {
            let pts = clamp((venERA - 4.20) * 1.5, 5);
            score += pts;
            breakdown.push({ label: 'Pitcher Park Hist.', value: venERA.toFixed(2)+' ERA ('+vg.length+' GS)', pts: (pts>0?'+':'')+pts.toFixed(1), note: venERA > 5 ? 'struggles here' : venERA < 3 ? 'dominant here' : 'avg here', color: venERA > 5 ? '#34d399' : venERA < 3 ? '#f87171' : '#a1a1aa' });
          } else {
            breakdown.push({ label: 'Pitcher Park Hist.', value: 'N/A', pts: '—', note: 'no IP at venue', color: '#52525b' });
          }
        } else {
          breakdown.push({ label: 'Pitcher Park Hist.', value: vg.length+' GS', pts: '—', note: 'too few starts', color: '#52525b' });
        }
      } else {
        breakdown.push({ label: 'Pitcher Park Hist.', value: 'N/A', pts: '—', note: 'no venue data', color: '#52525b' });
      }

      // 3. BvP vs Starter (weighted composite)
      if (bvpData) {
        let pts = clamp((bvpData.woba - 0.320) * 30, 8);
        score += pts;
        let q = bvpData.woba > .380 ? 'lineup owns this pitcher' : bvpData.woba > .340 ? 'favorable matchup' : bvpData.woba < .260 ? 'pitcher dominates lineup' : 'neutral matchup history';
        breakdown.push({ label: 'BvP vs Starter', value: bvpData.woba.toFixed(3)+' wOBA ('+bvpData.count+'/9, '+bvpData.ab+' AB)', pts: (pts>0?'+':'')+pts.toFixed(1), note: q, color: bvpData.woba > .340 ? '#34d399' : bvpData.woba < .280 ? '#f87171' : '#a1a1aa' });
      } else {
        breakdown.push({ label: 'BvP vs Starter', value: 'N/A', pts: '—', note: 'no/insufficient matchup history', color: '#52525b' });
      }

      // 4. Lineup wRC+
      let w = lineupWoba(batters);
      let wrc = calcWRCplus(w);
      if (wrc != null) {
        let pts = clamp((wrc - 100) * 0.15, 6);
        score += pts;
        let q = wrc > 115 ? 'elite lineup' : wrc > 105 ? 'above avg' : wrc > 95 ? 'avg lineup' : 'below avg';
        breakdown.push({ label: 'Lineup wRC+', value: Math.round(wrc)+'', pts: (pts>0?'+':'')+pts.toFixed(1), note: q, color: wrc > 105 ? '#34d399' : wrc < 95 ? '#f87171' : '#a1a1aa' });
      } else {
        breakdown.push({ label: 'Lineup wRC+', value: 'N/A', pts: '—', note: 'no data', color: '#52525b' });
      }

      // 5. Lineup xwOBA
      let xw = lineupXwoba(batters);
      if (xw != null) {
        let pts = clamp((xw - 0.310) * 40, 6);
        score += pts;
        let q = xw > .340 ? 'elite contact' : xw > .320 ? 'above avg' : xw > .300 ? 'avg contact' : 'weak contact';
        breakdown.push({ label: 'Lineup xwOBA', value: xw.toFixed(3), pts: (pts>0?'+':'')+pts.toFixed(1), note: q, color: xw > .320 ? '#34d399' : xw < .300 ? '#f87171' : '#a1a1aa' });
      } else {
        breakdown.push({ label: 'Lineup xwOBA', value: 'N/A', pts: '—', note: 'need Savant', color: '#52525b' });
      }

      // 6. Opp Bullpen (high-leverage arms quality)
      let bpFips = oppBPIds.map(id => bpArmMap[id]).filter(a => a && (a.xfip || a.fip));
      if (bpFips.length) {
        let avgFip = bpFips.reduce((s,a) => s + (a.xfip || a.fip), 0) / bpFips.length;
        let pts = clamp((avgFip - 3.80) * 2, 5);
        score += pts;
        let names = bpFips.map(a => a.name.split(' ').pop()).join(', ');
        breakdown.push({ label: 'Opp. Bullpen (HL)', value: avgFip.toFixed(2)+' avg xFIP', pts: (pts>0?'+':'')+pts.toFixed(1), note: (avgFip > 4.2 ? 'weak pen' : avgFip < 3.2 ? 'elite pen' : 'avg pen')+' ('+names+')', color: avgFip > 4.2 ? '#34d399' : avgFip < 3.2 ? '#f87171' : '#a1a1aa' });
      } else {
        breakdown.push({ label: 'Opp. Bullpen (HL)', value: 'N/A', pts: '—', note: 'no bullpen data', color: '#52525b' });
      }

      // 7. Park Factor
      let parkPts = clamp((parkF - 1.0) * 5, 2);
      score += parkPts;
      breakdown.push({ label: 'Park Factor', value: parkF.toFixed(2), pts: (parkPts>0?'+':'')+parkPts.toFixed(1), note: parkF > 1.02 ? 'hitter friendly' : parkF < 0.98 ? 'pitcher friendly' : 'neutral', color: parkF > 1.02 ? '#34d399' : parkF < 0.98 ? '#38bdf8' : '#52525b' });

      return { score, breakdown };
    }

    let awEdge = computeEdge(enrichedAw, hpXFIP, hpGameLogs, awBvP, hmBPIds, parkFactor);
    let hmEdge = computeEdge(enrichedHm, apXFIP, apGameLogs, hmBvP, awBPIds, parkFactor);


    // Cache for homepage display
    edgeCache[g.gamePk] = { awScore: awEdge.score, hmScore: hmEdge.score, awAbbr: aw.team.abbreviation, hmAbbr: hm.team.abbreviation, full: true };

    // ========================================
    // RENDER EDGE BANNER
    // ========================================
    function renderEdgeBanner(teamAbbr, edge, record) {
      let s = edge.score;
      let color = s > 10 ? '#34d399' : s > 0 ? '#a1a1aa' : s > -10 ? '#f87171' : '#ef4444';
      let strength = Math.abs(s) > 20 ? 'STRONG' : Math.abs(s) > 10 ? 'MODERATE' : 'SLIGHT';
      let html = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">';
      html += '<span style="font-size:11px;font-weight:700;color:#fafafa">'+teamAbbr+' ('+record+')</span>';
      html += '<span style="font-size:14px;font-weight:800;font-family:monospace;color:'+color+'">'+(s>0?'+':'')+s.toFixed(1)+'</span>';
      html += '</div>';
      edge.breakdown.forEach(b => {
        html += '<div style="display:flex;justify-content:space-between;align-items:center;padding:3px 0;border-bottom:1px solid rgba(39,39,42,.3)">';
        html += '<span style="font-size:9px;color:#a1a1aa">'+b.label+'</span>';
        html += '<span style="font-size:9px;font-family:monospace;color:'+b.color+'">'+b.value+' ('+b.pts+' pts)</span>';
        html += '</div>';
        html += '<div style="font-size:8px;color:#52525b;padding:1px 0 3px">'+b.note+'</div>';
      });
      if (!edge.breakdown.length) {
        html += '<div style="font-size:9px;color:#52525b;padding:4px 0">Insufficient data for edge calculation</div>';
      }
      return html;
    }

    // Determine which team has the edge
    let favTeam = awEdge.score >= hmEdge.score ? aw.team.abbreviation : hm.team.abbreviation;
    let favScore = Math.max(awEdge.score, hmEdge.score);
    let edgeDiff = Math.abs(awEdge.score - hmEdge.score);
    let edgeVerdict = '';
    if (edgeDiff > 20) edgeVerdict = 'Strong edge on ' + favTeam;
    else if (edgeDiff > 10) edgeVerdict = 'Moderate edge on ' + favTeam;
    else if (edgeDiff > 5) edgeVerdict = 'Slight edge on ' + favTeam;
    else edgeVerdict = 'Toss-up — no clear analytical edge';

    // === RENDER ===
    let html = '';

    // Header
    html += '<div class="mhdr">';
    html += '<div style="font-size:16px;font-weight:700">'+aw.team.abbreviation+' <span style="color:#3f3f46">@</span> '+hm.team.abbreviation;
    if (isL && lsd) html += '<span class="badge blv">'+(lsd.isTopInning?'▲':'▼')+' '+(lsd.currentInningOrdinal||'')+'</span>';
    else if (isF) html += '<span class="badge bfn">FINAL</span>';
    html += '</div>';
    html += '<div style="font-size:9px;color:#52525b">('+aW+'-'+aL+') vs ('+hW+'-'+hL+')</div>';
    if (ls && (isL||isF)) {
      let aR=ls.teams?.away?.runs??0, hR=ls.teams?.home?.runs??0;
      html += '<div style="margin-top:6px;font-family:monospace;font-size:28px;font-weight:800">'+aR+'<span style="color:#3f3f46;margin:0 8px">-</span>'+hR+'</div>';
    }
    html += '</div>';

    // Edge banner
    html += '<details class="edge" open><summary style="cursor:pointer;font-weight:700;font-size:10px;color:#f59e0b;letter-spacing:1px">EDGE ANALYSIS · '+edgeVerdict+' ▾</summary>';
    html += '<div style="margin-top:8px">';
    html += renderEdgeBanner(aw.team.abbreviation, awEdge, aW+'-'+aL);
    html += '<div style="border-top:1px solid rgba(245,158,11,.2);margin:10px 0"></div>';
    html += renderEdgeBanner(hm.team.abbreviation, hmEdge, hW+'-'+hL);
    html += '</div></details>';

    // Linescore
    if (lsd?.innings?.length && (isL||isF)) {
      let inn = lsd.innings, ci = lsd.currentInning||inn.length, isTop = lsd.isTopInning;
      html += '<div style="overflow-x:auto;margin-bottom:10px"><table style="width:100%;border-collapse:collapse;font-size:10px;font-family:monospace;min-width:300px"><thead><tr><th style="text-align:left;padding:3px;color:#52525b;border-bottom:1px solid #27272a;font-weight:400;font-size:9px"></th>';
      inn.forEach((_,j) => html += '<th style="padding:3px;text-align:center;color:'+(isL&&j+1===ci?'#a3e635':'#52525b')+';border-bottom:1px solid #27272a;font-weight:'+(isL&&j+1===ci?'700':'400')+';font-size:9px">'+(j+1)+'</th>');
      html += '<th style="padding:3px;text-align:center;font-weight:700;color:#fafafa;border-bottom:1px solid #27272a;font-size:9px">R</th><th style="padding:3px;text-align:center;font-weight:700;color:#fafafa;border-bottom:1px solid #27272a;font-size:9px">H</th><th style="padding:3px;text-align:center;font-weight:700;color:#fafafa;border-bottom:1px solid #27272a;font-size:9px">E</th></tr></thead><tbody>';
      // Away
      html += '<tr><td style="text-align:left;padding:3px;font-weight:600;color:#fafafa;font-family:-apple-system,sans-serif;border-bottom:1px solid rgba(39,39,42,.3)">'+aw.team.abbreviation+'</td>';
      inn.forEach((n,j) => html += '<td style="padding:3px;text-align:center;color:'+(isL&&j+1===ci&&isTop?'#a3e635':'#a1a1aa')+';border-bottom:1px solid rgba(39,39,42,.3)">'+(n.away?.runs??'—')+'</td>');
      html += '<td style="padding:3px;text-align:center;font-weight:700;color:#fafafa;border-bottom:1px solid rgba(39,39,42,.3)">'+(ls.teams?.away?.runs??0)+'</td><td style="padding:3px;text-align:center;font-weight:700;color:#fafafa;border-bottom:1px solid rgba(39,39,42,.3)">'+(ls.teams?.away?.hits??0)+'</td><td style="padding:3px;text-align:center;font-weight:700;color:#fafafa;border-bottom:1px solid rgba(39,39,42,.3)">'+(ls.teams?.away?.errors??0)+'</td></tr>';
      // Home
      html += '<tr><td style="text-align:left;padding:3px;font-weight:600;color:#fafafa;font-family:-apple-system,sans-serif;border-bottom:1px solid rgba(39,39,42,.3)">'+hm.team.abbreviation+'</td>';
      inn.forEach((n,j) => html += '<td style="padding:3px;text-align:center;color:'+(isL&&j+1===ci&&!isTop?'#a3e635':'#a1a1aa')+';border-bottom:1px solid rgba(39,39,42,.3)">'+(n.home?.runs??'')+'</td>');
      html += '<td style="padding:3px;text-align:center;font-weight:700;color:#fafafa;border-bottom:1px solid rgba(39,39,42,.3)">'+(ls.teams?.home?.runs??0)+'</td><td style="padding:3px;text-align:center;font-weight:700;color:#fafafa;border-bottom:1px solid rgba(39,39,42,.3)">'+(ls.teams?.home?.hits??0)+'</td><td style="padding:3px;text-align:center;font-weight:700;color:#fafafa;border-bottom:1px solid rgba(39,39,42,.3)">'+(ls.teams?.home?.errors??0)+'</td></tr>';
      html += '</tbody></table></div>';
    }

    // Odds section
    let kd = kalshi[g.gamePk];
    if (kd && kd.markets && kd.markets.length) {
      html += '<div class="ksection"><div class="klab">BETTING LINES · TAP TO PICK</div>';
      kd.markets.forEach(mkt => {
        if (mkt.type === 'ml') {
          // Moneyline
          let awPk = picks[g.gamePk+'_ml_away'];
          let hmPk = picks[g.gamePk+'_ml_home'];
          let awOdds = kd.ml_away != null ? (kd.ml_away > 0 ? '+' : '') + kd.ml_away : '—';
          let hmOdds = kd.ml_home != null ? (kd.ml_home > 0 ? '+' : '') + kd.ml_home : '—';
          html += '<div class="kmkt"><span class="ktitle">Moneyline</span>';
          html += '<button class="kyes '+(awPk?'picked':'')+'" onclick="event.stopPropagation();makePick('+g.gamePk+',\'ml_away\',\''+kd.ml_away+'\',\''+aw.team.abbreviation+' ML '+awOdds+'\',\'away\')">'+aw.team.abbreviation+' '+awOdds+'</button>';
          html += '<button class="kno '+(hmPk?'picked':'')+'" onclick="event.stopPropagation();makePick('+g.gamePk+',\'ml_home\',\''+kd.ml_home+'\',\''+hm.team.abbreviation+' ML '+hmOdds+'\',\'home\')">'+hm.team.abbreviation+' '+hmOdds+'</button>';
          html += '</div>';
          html += '<div style="font-size:8px;color:#3f3f46;padding:0 0 4px">via ' + (mkt.book||'') + '</div>';
        }
        if (mkt.type === 'spread' && mkt.outcomes) {
          html += '<div class="kmkt"><span class="ktitle">Run Line</span>';
          mkt.outcomes.forEach(o => {
            let pk = picks[g.gamePk+'_spread_'+o.name];
            let odds = o.price != null ? (o.price > 0 ? '+' : '') + o.price : '—';
            let pt = o.point != null ? (o.point > 0 ? '+' : '') + o.point : '';
            html += '<button class="kyes '+(pk?'picked':'')+'" onclick="event.stopPropagation();makePick('+g.gamePk+',\'spread_'+o.name+'\',\''+o.price+'\',\''+o.name+' '+pt+' ('+odds+')\',\''+o.name+'\')">'+o.name+' '+pt+' ('+odds+')</button>';
          });
          html += '</div>';
        }
        if (mkt.type === 'totals' && mkt.outcomes) {
          let pt = mkt.outcomes[0]?.point || '';
          html += '<div class="kmkt"><span class="ktitle">Total ' + pt + '</span>';
          mkt.outcomes.forEach(o => {
            let pk = picks[g.gamePk+'_total_'+o.name];
            let odds = o.price != null ? (o.price > 0 ? '+' : '') + o.price : '—';
            html += '<button class="'+(o.name==='Over'?'kyes':'kno')+' '+(pk?'picked':'')+'" onclick="event.stopPropagation();makePick('+g.gamePk+',\'total_'+o.name+'\',\''+o.price+'\',\''+o.name+' '+pt+' ('+odds+')\',\''+o.name+'\')">'+o.name+' ('+odds+')</button>';
          });
          html += '</div>';
        }
      });
      html += '</div>';
    } else {
      html += '<div class="ksection"><div class="klab">BETTING LINES</div><div style="font-size:10px;color:#52525b;padding:4px 0">No odds available yet. Lines post closer to game time.</div></div>';
    }

    // Away team section
    html += '<div style="font-size:12px;font-weight:700;margin-top:4px">'+aw.team.abbreviation+'</div>';
    html += pitcherCard(ap, apS, aw.team.abbreviation+' SP');
    html += '<div style="font-size:9px;color:#52525b;margin:4px 0 2px">Batting vs '+(hp?.fullName||'TBD')+' <span style="color:'+(awConfirmed?'#34d399':'#f59e0b')+'">'+(awConfirmed?'✓ Confirmed':'⟡ Projected')+'</span></div>';
    html += batterTable(enrichedAw, curBatId, isL||isF);

    html += '<hr class="divider">';

    // Home team section
    html += '<div style="font-size:12px;font-weight:700;margin-top:4px">'+hm.team.abbreviation+'</div>';
    html += pitcherCard(hp, hpS, hm.team.abbreviation+' SP');
    html += '<div style="font-size:9px;color:#52525b;margin:4px 0 2px">Batting vs '+(ap?.fullName||'TBD')+' <span style="color:'+(hmConfirmed?'#34d399':'#f59e0b')+'">'+(hmConfirmed?'✓ Confirmed':'⟡ Projected')+'</span></div>';
    html += batterTable(enrichedHm, curBatId, isL||isF);

    html += '<div class="leg"><b style="color:#fafafa">Legend</b><br>';
    html += '<span class="grn">●</span> wOBA .340+ (above avg) · ';
    html += '<span class="red">●</span> wOBA below .300 (below avg) · ';
    html += '<span class="amb">●</span> wOBA .370+ (elite) or HR in game · ';
    html += '<span style="color:#c084fc">●</span> Savant xwOBA · ';
    html += '<span style="color:#fbbf24">●</span> Currently at bat';
    html += '</div>';

    html += '<details class="leg" style="margin-top:6px"><summary style="cursor:pointer;color:#a1a1aa;font-weight:600">What do these metrics mean? ▾</summary><div style="margin-top:8px;line-height:1.8">';
    html += '<b style="color:#fafafa">AVG</b> — Batting average. Hits / at-bats. League avg ~.250.<br>';
    html += '<b style="color:#fafafa">OPS</b> — On-base plus slugging. League avg ~.710. Above .800 strong, .900+ elite.<br>';
    html += '<b style="color:#fafafa">wOBA</b> — Weighted on-base average. Best single measure of offensive value. League avg ~.310. Above .340 good, .370+ elite.<br>';
    html += '<b style="color:#c084fc">xwOBA</b> — Expected wOBA (Savant). Based on exit velocity + launch angle. Strips luck/defense. If xwOBA > wOBA, hitter is unlucky.<br>';
    html += '<b style="color:#fafafa">wRC+</b> — Weighted runs created plus. 100 = league avg. 120+ = elite. Scales wOBA to a per-plate-appearance run value.<br>';
    html += '<b style="color:#fafafa">BvP</b> — Batter vs Pitcher. Career wOBA against the opposing starter. "—" if fewer than 3 AB.<br>';
    html += '<b style="color:#fafafa">ERA</b> — Earned run average. Runs allowed per 9 IP. League avg ~4.00. Under 3.00 = ace.<br>';
    html += '<b style="color:#fafafa">FIP</b> — Fielding independent pitching. Only K, BB, HR. Better predictor than ERA.<br>';
    html += '<b style="color:#fafafa">xFIP</b> — Expected FIP (Savant). Normalizes HR/flyball rate. Most stable pitcher quality metric. Best predictor of future performance.<br>';
    html += '<b style="color:#fafafa">Pitcher Park Hist.</b> — Career ERA at this specific ballpark. 2+ starts required. Shows if a pitcher historically struggles or dominates at a venue.<br>';
    html += '<b style="color:#fafafa">Opp. Bullpen (HL)</b> — Average xFIP of the opponent\'s high-leverage relief arms (closer, setup, specialists). Measures late-game vulnerability.<br>';
    html += '</div></details>';
    $('app').innerHTML = html;

  } catch(e) {
    console.error('Matchup error:', e);
    $('app').innerHTML = '<div class="err">Error loading matchup<br><small>'+e.message+'</small><br><button onclick="openGame('+i+')">Retry</button></div>';
  }
}

function pitcherCard(p, s, label) {
  if (!p) return '<div class="pcard"><div class="lab">'+label+'</div><div style="font-size:14px;color:#52525b">TBD</div></div>';
  let era = s ? +s.era : null;
  let fip = calcFIP(s);
  return '<div class="pcard"><div class="lab">'+label+'</div><div style="display:flex;justify-content:space-between"><div><div style="font-size:14px;font-weight:700">'+p.fullName+'</div><div style="font-size:9px;color:#52525b;margin-top:2px">'+(s?.wins||0)+'-'+(s?.losses||0)+' · '+(s?.inningsPitched||0)+' IP · '+(s?.strikeOuts||0)+' K · '+fmt(+(s?.whip||0),2)+' WHIP</div></div><div style="text-align:right"><div style="font-size:9px;color:#52525b">ERA / FIP</div><div style="font-size:14px;font-weight:700;font-family:monospace"><span class="'+eColor(era)+'">'+fmt(era,2)+'</span><span style="color:#3f3f46;margin:0 2px">/</span><span class="'+eColor(fip)+'">'+fmt(fip,2)+'</span></div></div></div></div>';
}

function batterTable(batters, curBatId, showGame) {
  if (!batters || !batters.length) return '<p style="text-align:center;color:#3f3f46;padding:10px;font-size:10px">Lineup not posted</p>';
  let hasSavant = batters.some(b => b.xwoba);
  let html = '<div style="overflow-x:auto"><table class="bt"><thead><tr><th style="text-align:left">#</th><th style="text-align:left">Batter</th><th style="text-align:center">P</th><th>AVG</th><th>OPS</th><th>wOBA</th>';
  if (hasSavant) html += '<th style="color:#c084fc">xwOBA</th>';
  html += '<th>BvP</th>';
  if (showGame) html += '<th>H</th><th>AB</th><th>HR</th><th>R</th><th>RBI</th>';
  html += '</tr></thead><tbody>';
  batters.forEach((b, i) => {
    let isUp = curBatId && b.id == curBatId;
    html += '<tr class="'+(isUp?'ab':'')+'"><td>'+(i+1)+'</td><td>'+b.name+(isUp?' ◀':'')+'</td><td>'+b.pos+'</td>';
    html += '<td>'+(b.avg||'—')+'</td><td>'+(b.ops||'—')+'</td>';
    html += '<td class="'+wColor(b.woba)+'">'+fmt(b.woba)+'</td>';
    if (hasSavant) {
      let xw = b.xwoba ? +b.xwoba : null;
      html += '<td class="'+wColor(xw)+'">'+(b.xwoba||'—')+'</td>';
    }
    // BvP column
    let bvp = b.bvpWoba;
    let bvpAB = b.bvpAB || 0;
    html += '<td class="'+wColor(bvpAB >= 3 ? bvp : null)+'">'+(bvpAB >= 3 ? fmt(bvp) : '—')+'</td>';
    if (showGame) {
      html += '<td>'+(b.gH!=null?b.gH:'—')+'</td>';
      html += '<td>'+(b.gAB!=null?b.gAB:'—')+'</td>';
      html += '<td class="'+(b.gHR>0?'amb':'')+'">'+(b.gHR!=null?b.gHR:'—')+'</td>';
      html += '<td>'+(b.gR!=null?b.gR:'—')+'</td>';
      html += '<td>'+(b.gRBI!=null?b.gRBI:'—')+'</td>';
    }
    html += '</tr>';
  });
  html += '</tbody></table></div>';
  let ws = batters.map(b=>b.woba).filter(w=>w!=null);
  let avg = ws.length ? ws.reduce((a,b)=>a+b,0)/ws.length : null;
  let xws = batters.map(b=>b.xwoba?+b.xwoba:null).filter(w=>w!=null);
  let xavg = xws.length ? xws.reduce((a,b)=>a+b,0)/xws.length : null;
  let bvps = batters.filter(b=>b.bvpWoba!=null&&b.bvpAB>=3).map(b=>b.bvpWoba);
  let bavg = bvps.length ? bvps.reduce((a,b)=>a+b,0)/bvps.length : null;
  html += '<div style="font-size:9px;color:#52525b;margin-top:4px">Team wOBA: <span class="'+wColor(avg)+'" style="font-family:monospace">'+fmt(avg)+'</span>';
  if (xavg != null) html += ' · xwOBA: <span class="'+wColor(xavg)+'" style="font-family:monospace">'+fmt(xavg)+'</span>';
  if (bavg != null) html += ' · BvP: <span class="'+wColor(bavg)+'" style="font-family:monospace">'+fmt(bavg)+'</span>';
  html += '</div>';
  return html;
}

function refresh() {
  if (mode === 'detail' && sel !== null) { openGame(sel); }
  else { load(); }
}

function makePick(gamePk, type, price, label, side) {
  let key = gamePk + '_' + type;
  if (picks[key] && picks[key].side === (side||type)) { delete picks[key]; }
  else { picks[key] = { type, side: side||type, price, label, date: date, ts: Date.now() }; }
  savePicks();
  if (mode === 'detail' && sel !== null) openGame(sel);
  else if (mode === 'list') renderList();
}

function clearAllPicks() {
  // Only clear picks for the current date
  let dayKeys = Object.entries(picks).filter(([k, p]) => p.date === date).map(([k]) => k);
  if (!dayKeys.length) return;
  let conf = confirm('Clear all ' + dayKeys.length + ' picks for ' + prettyDate() + '? This cannot be undone.');
  if (conf) {
    dayKeys.forEach(k => delete picks[k]);
    savePicks();
    renderList();
  }
}

// Start
load();
</script>
