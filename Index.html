<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#09090b">
<title>MLB Edge</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%2309090b' width='100' height='100' rx='20'/><text x='50' y='68' text-anchor='middle' font-size='50'>⚾</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#09090b;--s1:#111113;--s2:#1a1a1d;--bdr:#27272a;--t1:#fafafa;--t2:#a1a1aa;--t3:#52525b;--t4:#3f3f46;--amb:#f59e0b;--amb2:rgba(245,158,11,.12);--grn:#34d399;--red:#f87171;--sky:#38bdf8;--mono:'SF Mono','Menlo','Consolas',monospace}
body{background:var(--bg);color:var(--t1);font-family:-apple-system,'SF Pro Text','Helvetica Neue',sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh;padding:env(safe-area-inset-top) 12px 80px 12px}
.hdr{display:flex;align-items:center;gap:8px;margin-bottom:2px;padding-top:8px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--amb)}
h1{font-size:15px;font-weight:700;letter-spacing:-.3px}
.sub{font-size:9px;color:var(--t3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:12px}
.date-nav{display:flex;gap:4px;margin-bottom:12px}
.date-nav button{background:var(--s1);border:1px solid var(--bdr);color:var(--t2);border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.date-nav button:active{background:var(--s2)}
.date-nav .cur{flex:1;text-align:center;font-size:11px;display:flex;align-items:center;justify-content:center;color:var(--t2)}
.filters{display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap}
.fbtn{background:var(--s1);border:1px solid var(--bdr);color:var(--t3);border-radius:6px;padding:4px 10px;font-size:10px;letter-spacing:.8px;cursor:pointer}
.fbtn.on{background:var(--amb2);color:var(--amb);border-color:rgba(245,158,11,.25)}
.gcard{display:block;width:100%;text-align:left;background:var(--s1);border:1px solid var(--bdr);border-radius:10px;padding:10px;margin-bottom:6px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .15s}
.gcard:active{background:var(--s2)}
.gcard .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.gcard .teams{font-size:12px;font-weight:700}
.gcard .teams .at{color:var(--t4);font-weight:400;margin:0 4px}
.gcard .time{font-size:9px;color:var(--t3)}
.gcard .pits{font-size:9px;color:var(--t2);margin-top:2px}
.gcard .eras{font-size:9px;color:var(--t4);margin-top:1px;font-family:var(--mono)}
.gcard .ml{font-size:9px;color:var(--t4);margin-top:2px}
.back{font-size:10px;color:var(--amb);background:none;border:none;cursor:pointer;margin-bottom:8px;padding:4px 0}
.matchup-hdr{background:var(--s1);border:1px solid var(--bdr);border-radius:10px;padding:10px;text-align:center;margin-bottom:8px}
.matchup-hdr .vs{font-size:16px;font-weight:700}
.matchup-hdr .rec{font-size:9px;color:var(--t3)}
.matchup-hdr .gtime{font-size:9px;color:var(--t3);margin-top:3px}
.edge-box{background:var(--amb2);border:1px solid rgba(245,158,11,.15);border-radius:8px;padding:8px;margin-bottom:10px;font-size:10px;color:rgba(245,158,11,.85);line-height:1.5}
.edge-box b{color:var(--amb);font-size:9px;letter-spacing:1px}
.pcard{background:var(--s1);border:1px solid var(--bdr);border-radius:10px;padding:10px;margin-bottom:6px}
.pcard .lab{font-size:9px;color:var(--amb);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:4px}
.pcard .row{display:flex;justify-content:space-between;align-items:flex-start}
.pcard .name{font-size:14px;font-weight:700}
.pcard .hand{font-size:11px;color:var(--t3);font-weight:400}
.pcard .meta{font-size:9px;color:var(--t3);margin-top:2px}
.pcard .era-label{font-size:9px;color:var(--t3)}
.pcard .era-vals{font-size:14px;font-weight:700;font-family:var(--mono)}
.pcard .era-vals .sep{color:var(--t4);margin:0 2px}
.tbl-label{font-size:9px;color:var(--t3);letter-spacing:1.2px;text-transform:uppercase;margin:8px 0 4px}
table{width:100%;border-collapse:collapse;font-size:10px}
th{text-align:right;padding:3px 2px;font-weight:400;color:var(--t3);border-bottom:1px solid var(--bdr)}
th:first-child,th:nth-child(2){text-align:left}
td{padding:4px 2px;border-bottom:1px solid rgba(39,39,42,.4);font-family:var(--mono);font-size:10px;text-align:right}
td:first-child{text-align:left;color:var(--t4);font-size:9px;width:14px}
td:nth-child(2){text-align:left;color:var(--t1);font-family:-apple-system,sans-serif;font-weight:500;max-width:95px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
td:nth-child(3){text-align:center;color:var(--t3);font-family:-apple-system,sans-serif}
.tm-avg{font-size:9px;color:var(--t3);margin-top:4px;padding-left:2px}
.tm-avg span{font-family:var(--mono)}
.grn{color:var(--grn)}.red{color:var(--red)}.sky{color:var(--sky)}.amb{color:var(--amb);font-weight:600}.t2c{color:var(--t2)}
.legend{background:rgba(17,17,19,.6);border:1px solid rgba(39,39,42,.4);border-radius:8px;padding:8px;margin-top:14px;font-size:9px;color:var(--t3);line-height:1.6}
.loader{text-align:center;padding:60px 0;color:var(--t3);font-size:11px}
.loader .spin{display:inline-block;width:18px;height:18px;border:2px solid var(--t4);border-top-color:var(--amb);border-radius:50%;animation:sp .6s linear infinite;margin-bottom:8px}
@keyframes sp{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:20px;color:var(--t4);font-size:10px}
.divider{border:none;border-top:1px solid var(--bdr);margin:14px 0}
</style>
</head>
<body>
<div class="hdr"><div class="dot"></div><h1>MLB Edge</h1></div>
<div class="sub" id="subtitle">LOADING...</div>
<div class="date-nav">
  <button onclick="shiftDate(-1)">←</button>
  <div class="cur" id="dateLabel"></div>
  <button onclick="shiftDate(1)">→</button>
</div>
<div id="app"></div>

<script>
const API='https://statsapi.mlb.com/api/v1';
const W={bb:.69,hbp:.72,s:.88,d:1.24,t:1.57,hr:2.01};
const FIP_C=3.10;
let currentDate=new Date().toISOString().slice(0,10);
let games=[];
let view='list';
let selectedGame=null;
let filter='ALL';

function $(id){return document.getElementById(id)}
function fmt(v,d=3){return v==null||isNaN(v)?'—':Number(v).toFixed(d)}
function wC(w){if(w==null)return't2c';let n=Number(w);if(n>.37)return'amb';if(n>.34)return'grn';if(n<.26)return'sky';if(n<.30)return'red';return't2c'}
function eC(v){if(v==null)return't2c';let n=Number(v);if(n<3.5)return'grn';if(n>4.5)return'red';return't2c'}

function calcWOBA(s){
  if(!s)return null;
  let singles=(s.hits||0)-(s.doubles||0)-(s.triples||0)-(s.homeRuns||0);
  let num=W.bb*((s.baseOnBalls||0)-(s.intentionalWalks||0))+W.hbp*(s.hitByPitch||0)+W.s*singles+W.d*(s.doubles||0)+W.t*(s.triples||0)+W.hr*(s.homeRuns||0);
  let den=(s.atBats||0)+(s.baseOnBalls||0)-(s.intentionalWalks||0)+(s.sacFlies||0)+(s.hitByPitch||0);
  return den>0?num/den:null;
}
function calcFIP(s){
  if(!s)return null;
  let ip=parseFloat(s.inningsPitched||0);
  if(ip===0)return null;
  return(13*(s.homeRuns||0)+3*((s.baseOnBalls||0)+(s.hitByPitch||0))-2*(s.strikeOuts||0))/ip+FIP_C;
}

async function fetchJ(url){
  try{let r=await fetch(url);if(!r.ok)return null;return r.json()}catch(e){return null}
}

function shiftDate(dir){
  let d=new Date(currentDate+'T12:00:00');
  d.setDate(d.getDate()+dir);
  currentDate=d.toISOString().slice(0,10);
  loadSchedule();
}

function updateDateLabel(){
  let d=new Date(currentDate+'T12:00:00');
  $('dateLabel').textContent=d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});
}

async function loadSchedule(){
  view='list';selectedGame=null;filter='ALL';
  updateDateLabel();
  $('subtitle').textContent='LOADING SCHEDULE...';
  $('app').innerHTML='<div class="loader"><div class="spin"></div><div>Fetching games...</div></div>';
  
  let data=await fetchJ(`${API}/schedule?sportId=1&date=${currentDate}&hydrate=probablePitcher(note),linescore,team`);
  if(!data||!data.dates||!data.dates[0]){
    $('app').innerHTML='<div class="empty">No games found for this date</div>';
    $('subtitle').textContent='NO GAMES';
    return;
  }
  games=data.dates[0].games||[];
  $('subtitle').textContent=`${games.length} GAMES · wOBA · FIP · TAP TO ANALYZE`;
  renderList();
}

function getTimeTag(g){
  let h=new Date(g.gameDate).getHours();
  if(h<16)return'EARLY';if(h<20)return'MID';return'LATE';
}

function renderList(){
  let filtered=filter==='ALL'?games:games.filter(g=>getTimeTag(g)===filter);
  let tags=[...new Set(games.map(getTimeTag))];
  
  let html='<div class="filters">';
  html+=`<button class="fbtn ${filter==='ALL'?'on':''}" onclick="setFilter('ALL')">ALL</button>`;
  tags.forEach(t=>{html+=`<button class="fbtn ${filter===t?'on':''}" onclick="setFilter('${t}')">${t}</button>`});
  html+='</div>';
  
  filtered.sort((a,b)=>new Date(a.gameDate)-new Date(b.gameDate));
  filtered.forEach((g,i)=>{
    let idx=games.indexOf(g);
    let away=g.teams.away,home=g.teams.home;
    let ap=away.probablePitcher,hp=home.probablePitcher;
    let time=new Date(g.gameDate).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
    let status=g.status?.detailedState||'';
    
    html+=`<button class="gcard" onclick="loadMatchup(${idx})">`;
    html+=`<div class="top"><div class="teams">${away.team.abbreviation}<span class="at">@</span>${home.team.abbreviation}</div><div class="time">${time} · ${status}</div></div>`;
    html+=`<div class="pits">${ap?ap.fullName:'TBD'} vs ${hp?hp.fullName:'TBD'}</div>`;
    if(ap?.note||hp?.note)html+=`<div class="eras">${ap?.note||''} vs ${hp?.note||''}</div>`;
    html+=`</button>`;
  });
  $('app').innerHTML=html;
}

function setFilter(f){filter=f;renderList()}

async function loadMatchup(idx){
  view='detail';selectedGame=idx;
  let g=games[idx];
  let away=g.teams.away,home=g.teams.home;
  
  $('app').innerHTML='<button class="back" onclick="backToList()">← Back</button><div class="loader"><div class="spin"></div><div>Fetching pitchers, lineups, stats & BvP...</div><div style="color:#3f3f46;font-size:9px;margin-top:4px">This takes 10-20 seconds</div></div>';
  
  let ap=away.probablePitcher, hp=home.probablePitcher;
  
  // Fetch pitcher stats
  let [apStats,hpStats]=await Promise.all([
    ap?fetchJ(`${API}/people/${ap.id}?hydrate=stats(group=[pitching],type=[season],season=2026)`):null,
    hp?fetchJ(`${API}/people/${hp.id}?hydrate=stats(group=[pitching],type=[season],season=2026)`):null
  ]);
  let apS=apStats?.people?.[0]?.stats?.[0]?.splits?.[0]?.stat||null;
  let hpS=hpStats?.people?.[0]?.stats?.[0]?.splits?.[0]?.stat||null;
  
  // Fetch lineups from game feed
  let feed=await fetchJ(`${API}/v1.1/game/${g.gamePk}/feed/live`);
  let box=feed?.liveData?.boxscore;
  
  let awayBatters=[],homeBatters=[];
  if(box){
    ['away','home'].forEach(side=>{
      let info=box.teams[side];
      let order=info.battingOrder||[];
      let arr=order.map(id=>{
        let p=info.players['ID'+id];
        return{id,name:p?.person?.fullName||'Unknown',pos:p?.position?.abbreviation||'—'};
      });
      if(side==='away')awayBatters=arr;else homeBatters=arr;
    });
  }
  
  // Fallback: active roster
  if(awayBatters.length===0){
    let r=await fetchJ(`${API}/teams/${away.team.id}/roster?rosterType=active`);
    if(r?.roster)awayBatters=r.roster.filter(p=>['Hitter','Outfielder','Infielder','Catcher'].includes(p.position.type)).slice(0,9).map(p=>({id:p.person.id,name:p.person.fullName,pos:p.position.abbreviation}));
  }
  if(homeBatters.length===0){
    let r=await fetchJ(`${API}/teams/${home.team.id}/roster?rosterType=active`);
    if(r?.roster)homeBatters=r.roster.filter(p=>['Hitter','Outfielder','Infielder','Catcher'].includes(p.position.type)).slice(0,9).map(p=>({id:p.person.id,name:p.person.fullName,pos:p.position.abbreviation}));
  }
  
  // Fetch batter stats + BvP in parallel
  async function enrichBatters(batters, oppPitcherId){
    return Promise.all(batters.map(async b=>{
      let [pData,bvpData]=await Promise.all([
        fetchJ(`${API}/people/${b.id}?hydrate=stats(group=[hitting],type=[season],season=2026)`),
        oppPitcherId?fetchJ(`${API}/people/${b.id}/stats?stats=vsPlayer&opposingPlayerId=${oppPitcherId}&group=hitting&sportId=1`):null
      ]);
      let ss=pData?.people?.[0]?.stats?.[0]?.splits?.[0]?.stat||null;
      let bvpSplits=bvpData?.stats?.[0]?.splits||[];
      let bvpCombined=null;
      if(bvpSplits.length>0){
        bvpCombined={};
        bvpSplits.forEach(sp=>{let s=sp.stat;Object.keys(s).forEach(k=>{if(typeof s[k]==='number')bvpCombined[k]=(bvpCombined[k]||0)+s[k]})});
      }
      return{...b,avg:ss?.avg||null,obp:ss?.obp||null,slg:ss?.slg||null,ops:ss?.ops||null,woba:calcWOBA(ss),bvpWoba:calcWOBA(bvpCombined),bvpAB:bvpCombined?.atBats||0};
    }));
  }
  
  let [enrichedAway,enrichedHome]=await Promise.all([
    enrichBatters(awayBatters,hp?.id),
    enrichBatters(homeBatters,ap?.id)
  ]);
  
  renderMatchup(g,{apS,hpS,ap,hp,enrichedAway,enrichedHome,away,home});
}

function renderMatchup(g,d){
  let html=`<button class="back" onclick="backToList()">← Back</button>`;
  
  // Header
  html+=`<div class="matchup-hdr"><div class="vs">${d.away.team.abbreviation} <span style="color:var(--t4)">@</span> ${d.home.team.abbreviation}</div>`;
  html+=`<div class="rec">(${d.away.team.record?.wins||'?'}-${d.away.team.record?.losses||'?'}) vs (${d.home.team.record?.wins||'?'}-${d.home.team.record?.losses||'?'})</div>`;
  let time=new Date(g.gameDate).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',timeZoneName:'short'});
  html+=`<div class="gtime">${time}</div></div>`;
  
  // Away batting vs Home pitcher
  html+=renderPitcherCard(d.hp,d.hpS,d.home.team.abbreviation+' STARTER');
  html+=`<div class="tbl-label">${d.away.team.abbreviation} BATTING vs ${d.hp?.fullName||'TBD'}</div>`;
  html+=renderBatterTable(d.enrichedAway);
  
  html+=`<hr class="divider">`;
  
  // Home batting vs Away pitcher
  html+=renderPitcherCard(d.ap,d.apS,d.away.team.abbreviation+' STARTER');
  html+=`<div class="tbl-label">${d.home.team.abbreviation} BATTING vs ${d.ap?.fullName||'TBD'}</div>`;
  html+=renderBatterTable(d.enrichedHome);
  
  // Legend
  html+=`<div class="legend"><span class="grn">■</span> elite <span class="red">■</span> cold <span class="amb">■</span> crusher (BvP) <span class="sky">■</span> owned (BvP)<br>wOBA calculated from 2026 season components. FIP from K/BB/HR/IP. BvP = career vs pitcher (— = no history). Small BvP samples (&lt;10 AB) are noisy.</div>`;
  
  $('app').innerHTML=html;
}

function renderPitcherCard(p,stats,label){
  if(!p)return`<div class="pcard"><div class="lab">${label}</div><div class="name" style="color:var(--t3)">TBD</div></div>`;
  let era=stats?parseFloat(stats.era):null;
  let fip=calcFIP(stats);
  let html=`<div class="pcard"><div class="lab">${label}</div><div class="row"><div>`;
  html+=`<div class="name">${p.fullName} <span class="hand">(${stats?.note||''})</span></div>`;
  html+=`<div class="meta">${stats?.wins||0}-${stats?.losses||0} · ${stats?.inningsPitched||0} IP · ${stats?.strikeOuts||0} K · ${fmt(parseFloat(stats?.whip||0),2)} WHIP</div>`;
  html+=`</div><div style="text-align:right"><div class="era-label">ERA / FIP</div>`;
  html+=`<div class="era-vals"><span class="${eC(era)}">${fmt(era,2)}</span><span class="sep">/</span><span class="${eC(fip)}">${fmt(fip,2)}</span></div>`;
  html+=`</div></div></div>`;
  return html;
}

function renderBatterTable(batters){
  if(!batters||batters.length===0)return'<div class="empty">Lineup not yet posted</div>';
  let html=`<table><thead><tr><th style="text-align:left">#</th><th style="text-align:left">Batter</th><th style="text-align:center">P</th><th>AVG</th><th>OPS</th><th>wOBA</th><th>BvP</th></tr></thead><tbody>`;
  batters.forEach((b,i)=>{
    html+=`<tr><td>${i+1}</td><td>${b.name}</td><td>${b.pos}</td>`;
    html+=`<td>${b.avg||'—'}</td><td>${b.ops||'—'}</td>`;
    html+=`<td class="${wC(b.woba)}">${fmt(b.woba)}</td>`;
    html+=`<td class="${wC(b.bvpWoba)}">${b.bvpAB>=3?fmt(b.bvpWoba):'—'}</td>`;
    html+=`</tr>`;
  });
  html+=`</tbody></table>`;
  
  let ws=batters.filter(b=>b.woba!=null).map(b=>b.woba);
  let avg=ws.length?ws.reduce((a,b)=>a+b,0)/ws.length:null;
  let bvps=batters.filter(b=>b.bvpWoba!=null&&b.bvpAB>=3).map(b=>b.bvpWoba);
  let bavg=bvps.length?bvps.reduce((a,b)=>a+b,0)/bvps.length:null;
  html+=`<div class="tm-avg">Team wOBA: <span class="${wC(avg)}">${fmt(avg)}</span>`;
  if(bavg!=null)html+=` · Team BvP: <span class="${wC(bavg)}">${fmt(bavg)}</span>`;
  html+=`</div>`;
  return html;
}

function backToList(){view='list';renderList()}

// Init
updateDateLabel();
loadSchedule();
</script>
</body>
</html>
